name: CI

on: [push]

jobs:
  lint:
    name: Lint and type-check

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # Single version is enough: ruff and mypy both target the minimum supported
          # interpreter via `target-version` / `python_version` in pyproject.toml,
          # independently of the interpreter they run on.
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install --with dev

      - name: Run ruff
        run: poetry run ruff check .

      - name: Run mypy
        run: poetry run mypy

  build-python:
    name: CI (Python ${{ matrix.python-version }})

    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install

      - name: Run tests
        run: |
          poetry run tox

      - name: Generate XML coverage report
        run: |
          poetry run coverage xml -o coverage-${{ matrix.python-version }}.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: vintasoftware/vintasend
          fail_ci_if_error: false
          files: ./coverage-${{ matrix.python-version }}.xml
          flags: python-${{ matrix.python-version }}
          name: codecov-${{ matrix.python-version }}
